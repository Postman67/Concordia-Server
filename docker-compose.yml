services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: concordia
      POSTGRES_USER: concordia
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concordia"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Concordia Server ────────────────────────────────────────────────────────
  server:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: concordia
      DB_USER: concordia
      DB_PASSWORD: ${DB_PASSWORD}
      # URL of the Federation (override for local/self-hosted Federation instances)
      FEDERATION_URL: ${FEDERATION_URL:-https://federation.concordiachat.com}
      # Federation user ID of the server owner — can also be set in server.config.json
      ADMIN_USER_ID: ${ADMIN_USER_ID:-0}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
